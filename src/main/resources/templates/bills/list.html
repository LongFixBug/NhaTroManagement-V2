<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/_layout :: html(pageTitle=#{bill.list.all.title}, content=~{::content})}" lang="en">

<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
            <i class="bi bi-receipt me-2"></i>
            <span th:text="#{bill.list.all.title}">All Bills</span>
        </h2>
        <div>
            <button th:if="${not #lists.isEmpty(bills)}" onclick="downloadAllBills()" class="btn btn-success me-2">
                <i class="bi bi-download me-1"></i> <span th:text="#{button.download.all.zip}">Tải tất cả hóa đơn
                    (ZIP)</span>
            </button>
            <a sec:authorize="isAuthenticated()" th:href="@{/quick-entry}" class="btn btn-warning">
                <i class="bi bi-lightning-charge me-1"></i>
                <span th:text="#{nav.quickEntry}">Nhập Nhanh</span>
            </a>
        </div>
    </div>

    <!-- Filter Form -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <i class="bi bi-funnel me-2"></i>
                <span th:text="#{statistics.filter.title}">Bộ lọc</span>
            </h5>
        </div>
        <div class="card-body">
            <form th:action="@{/bills}" method="get">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label" th:text="#{statistics.filter.room}">Phòng</label>
                        <select name="tenantId" class="form-select">
                            <option value="" th:text="#{statistics.filter.allRooms}">-- Tất cả --</option>
                            <option th:each="tenant : ${tenants}" th:value="${tenant.id}" th:text="${tenant.name}"
                                th:selected="${tenant.id == selectedTenantId}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" th:text="#{statistics.filter.month}">Tháng</label>
                        <select name="month" class="form-select">
                            <option value="" th:text="#{statistics.filter.allMonths}">-- Tất cả --</option>
                            <option th:each="m : ${#numbers.sequence(1, 12)}" th:value="${m}" th:text="${m}"
                                th:selected="${m == selectedMonth}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" th:text="#{statistics.filter.year}">Năm</label>
                        <select name="year" class="form-select">
                            <option value="" th:text="#{statistics.filter.allYears}">-- Tất cả --</option>
                            <option th:each="y : ${years}" th:value="${y}" th:text="${y}"
                                th:selected="${y == selectedYear}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary me-2">
                            <i class="bi bi-search me-1"></i>
                            <span th:text="#{button.filter}">Lọc</span>
                        </button>
                        <a th:href="@{/bills}" class="btn btn-outline-secondary" th:text="#{button.reset}">Reset</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Results count and Bulk Actions -->
    <div class="d-flex justify-content-between align-items-center mb-3" th:unless="${#lists.isEmpty(bills)}">
        <div class="alert alert-info mb-0 py-2">
            <i class="bi bi-info-circle me-1"></i>
            <strong th:text="${#lists.size(bills)}"></strong>
            <span th:text="#{bill.list.count}">hóa đơn được tìm thấy</span>
        </div>

        <div class="bulk-actions" style="display: none;" id="bulkActionButtons">
            <button type="button" class="btn btn-sm btn-outline-success me-2"
                onclick="submitBulkForm('/bills/bulk-update-status', true)">
                <i class="bi bi-check2-circle"></i> <span th:text="#{button.bulk.markPaid}">Đánh dấu Đã TT</span>
            </button>
            <button type="button" class="btn btn-sm btn-outline-warning me-2"
                onclick="submitBulkForm('/bills/bulk-update-status', false)">
                <i class="bi bi-clock"></i> <span th:text="#{button.bulk.markUnpaid}">Đánh dấu Chưa TT</span>
            </button>
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="submitBulkDelete()">
                <i class="bi bi-trash"></i> <span th:text="#{button.bulk.delete}">Xóa đã chọn</span>
            </button>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(bills)}" class="alert alert-warning">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span th:text="#{bill.list.empty.system}">No bills found in the system.</span>
    </div>

    <div class="table-responsive" th:unless="${#lists.isEmpty(bills)}">
        <form id="bulkForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="isPaid" id="bulkIsPaidInput" value="" />
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 40px;">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="selectAllCheckbox"
                                    onclick="toggleAllCheckboxes(this)">
                            </div>
                        </th>
                        <th th:text="#{general.id}">ID</th>
                        <th th:text="#{bill.tenant}">Tenant</th>
                        <th th:text="#{bill.monthYear}">Month/Year</th>
                        <th th:text="#{bill.totalAmount}">Total Amount</th>
                        <th th:text="#{bill.status}">Status</th>
                        <th th:text="#{general.actions}">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="bill : ${bills}">
                        <td>
                            <div class="form-check">
                                <input class="form-check-input bill-checkbox" type="checkbox" name="billIds"
                                    th:value="${bill.id}" onchange="updateBulkActionButtons()">
                            </div>
                        </td>
                        <td th:text="${bill.id}"></td>
                        <td>
                            <i class="bi bi-house-door text-primary me-1"></i>
                            <span th:text="${bill.tenant.name}"></span>
                        </td>
                        <td>
                            <span class="badge bg-secondary" th:text="${bill.billMonth + '/' + bill.billYear}"></span>
                        </td>
                        <td class="fw-bold text-success"
                            th:text="${#numbers.formatDecimal(bill.totalAmount, 1, #messages.msg('format.decimal.groupingSeparator'), 0, #messages.msg('format.decimal.decimalSeparator')) + ' ' + #messages.msg('currency.vnd')}">
                        </td>
                        <td>
                            <span th:if="${bill.paid}" class="badge bg-success">
                                <i class="bi bi-check-circle me-1"></i>Đã thanh toán
                            </span>
                            <span th:unless="${bill.paid}" class="badge bg-warning text-dark">
                                <i class="bi bi-clock me-1"></i>Chưa thanh toán
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/bills/{id}(id=${bill.id})}" class="btn btn-sm btn-outline-info"
                                th:title="#{button.view.details}">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a sec:authorize="isAuthenticated()" th:href="@{/bills/edit/{id}(id=${bill.id})}"
                                class="btn btn-sm btn-outline-warning" th:title="#{button.edit}">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </div>

    <!-- Hidden container for rendering all bills for bulk download -->
    <div id="hidden-bills-container"
        style="position: absolute; top: -9999px; left: -9999px; width: 800px; z-index: -1;">
        <div th:each="bill : ${bills}" class="bill-snapshot-wrapper" th:data-room="${bill.tenant?.name}"
            th:data-month="${bill.billMonth}" th:data-year="${bill.billYear}">
            <div th:replace="~{bills/_bill_template :: bill}"></div>
        </div>
    </div>

    <!-- html2canvas and JSZip Libraries -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        // Checkboxes logic
        function toggleAllCheckboxes(source) {
            const checkboxes = document.querySelectorAll('.bill-checkbox');
            checkboxes.forEach(cb => cb.checked = source.checked);
            updateBulkActionButtons();
        }

        function updateBulkActionButtons() {
            const checkboxes = document.querySelectorAll('.bill-checkbox:checked');
            const actionButtons = document.getElementById('bulkActionButtons');
            if (checkboxes.length > 0) {
                actionButtons.style.display = 'block';
            } else {
                actionButtons.style.display = 'none';
                document.getElementById('selectAllCheckbox').checked = false;
            }
        }

        // Form submission logic
        function submitBulkForm(actionUrl, isPaid) {
            const form = document.getElementById('bulkForm');
            form.action = actionUrl;
            document.getElementById('bulkIsPaidInput').value = isPaid;
            form.submit();
        }

        function submitBulkDelete() {
            if (confirm('[[#{confirm.delete.bulk.text}]]')) {
                const form = document.getElementById('bulkForm');
                form.action = '/bills/bulk-delete';
                form.submit();
            }
        }

        // Existing download logic
        async function downloadAllBills() {
            const btn = document.querySelector('button[onclick="downloadAllBills()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i> Đang xử lý...';
            btn.disabled = true;

            try {
                const zip = new JSZip();
                const wrappers = document.querySelectorAll('.bill-snapshot-wrapper');

                for (let i = 0; i < wrappers.length; i++) {
                    const wrapper = wrappers[i];
                    const container = wrapper.querySelector('.bill-container');
                    if (!container) continue;

                    const roomName = wrapper.getAttribute('data-room') || 'bill';
                    const month = wrapper.getAttribute('data-month');
                    const year = wrapper.getAttribute('data-year');

                    const canvas = await html2canvas(container, {
                        scale: 2,
                        useCORS: true,
                        logging: false,
                        backgroundColor: "#ffffff"
                    });

                    const imgData = canvas.toDataURL('image/png').split(',')[1];
                    let fileName = `HoaDon_${roomName}_Thang${month}_Nam${year}.png`;
                    fileName = fileName.replace(/\s+/g, '_');

                    zip.file(fileName, imgData, { base64: true });
                }

                const currentMonth = wrappers.length > 0 ? wrappers[0].getAttribute('data-month') : 'All';
                const currentYear = wrappers.length > 0 ? wrappers[0].getAttribute('data-year') : 'All';
                const zipFileName = `TatCaHoaDon_Thang${currentMonth}_Nam${currentYear}.zip`;

                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, zipFileName);

            } catch (error) {
                console.error("Error generating zip:", error);
                alert("Có lỗi xảy ra khi tạo file nén. Vui lòng thử lại.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</th:block>

</html>
