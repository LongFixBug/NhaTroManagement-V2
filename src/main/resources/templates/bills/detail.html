<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/_layout :: html(pageTitle=${pageTitle}, content=~{::content})}" lang="en">

<th:block th:fragment="content">
    <div th:replace="~{bills/_bill_template :: bill}"></div>

    <div class="action-buttons">
        <a th:href="@{/bills/edit/{id}(id=${bill.id})}" class="btn btn-warning me-2" th:text="#{button.edit}">Edit</a>
        <form th:action="@{/bills/delete/{id}(id=${bill.id})}" method="post" style="display: inline-block;"
            th:onsubmit="'return confirm(\'' + #messages.msg('confirm.delete.bill.text', ${bill.id}) + '\');'">
            <button type="submit" class="btn btn-danger me-2" th:text="#{button.delete}">Delete</button>
        </form>
        <button type="button" onclick="downloadBillImage()" class="btn btn-success me-2">Tải ảnh hóa đơn</button>
        <a th:href="@{/bills/tenant/{tenantId}(tenantId=${bill.tenant.id})}" class="btn btn-secondary me-2"
            th:text="#{bill.details.backToTenantBillsButton}">Back to Tenant's Bills</a>
        <a th:href="@{/bills}" class="btn btn-info" th:text="#{bill.details.backToAllBillsButton}">Back to All Bills</a>
    </div>

    <!-- html2canvas Library -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script th:inline="javascript">
        function downloadBillImage() {
            const billContainer = document.querySelector('.bill-container');
            const roomNameRaw = /*[[${bill.tenant?.name}]]*/ 'bill';
            const roomName = roomNameRaw || 'bill';
            const month = /*[[${bill.billMonth}]]*/ 1;
            const year = /*[[${bill.billYear}]]*/ 2024;
            const fileName = `HoaDon_${roomName}_Thang${month}_Nam${year}.png`;

            html2canvas(billContainer, {
                scale: 2, // Higher quality
                useCORS: true,
                logging: false,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>

</th:block>

</html>
