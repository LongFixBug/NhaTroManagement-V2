<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security6"
    th:fragment="html (pageTitle, content)" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle != null ? pageTitle : 'NhaTro Management'}">NhaTro Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top app-navbar">
        <div class="container-fluid app-shell py-2">
            <a class="navbar-brand app-brand" th:href="@{/}">
                <span class="app-brand-mark">
                    <i class="bi bi-house-heart-fill"></i>
                </span>
                <span class="app-brand-text">
                    <span class="app-brand-title" th:text="#{app.title}">NhaTro Management</span>
                    <span class="app-brand-subtitle">Soft Bento Admin</span>
                </span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarDefault"
                aria-controls="navbarDefault" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarDefault">
                <ul class="navbar-nav me-auto mb-2 mb-md-0" id="mainNav">
                    <li class="nav-item">
                        <a class="nav-link app-nav-link" data-nav="home" th:href="@{/}">
                            <i class="bi bi-grid-1x2 me-1"></i>
                            <span>Home</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link app-nav-link" data-nav="tenants" th:href="@{/tenants}">
                            <i class="bi bi-house-door me-1"></i>
                            <span th:text="#{nav.tenants}">Tenants</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link app-nav-link" data-nav="bills" th:href="@{/bills}">
                            <i class="bi bi-receipt me-1"></i>
                            <span>All Bills</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link app-nav-link" data-nav="statistics" th:href="@{/bills/statistics}">
                            <i class="bi bi-bar-chart me-1"></i>
                            <span th:text="#{nav.statistics}">Thống Kê</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link app-nav-link app-nav-accent" data-nav="quick-entry" th:href="@{/quick-entry}">
                            <i class="bi bi-lightning-charge-fill"></i>
                            <span th:text="#{nav.quickEntry}">Nhập Nhanh</span>
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link app-nav-link" data-nav="settings" th:href="@{/settings}">
                            <i class="bi bi-sliders2 me-1"></i>
                            <span th:text="#{nav.settings}">Settings</span>
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto mb-2 mb-md-0">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link app-nav-link" th:href="@{/login}" th:text="#{nav.login}">Login</a>
                    </li>

                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link app-nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            <span th:text="#{nav.logged_in_as}">Logged in as:</span> <span
                                sec:authentication="name">Username</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li>
                                <form th:action="@{/logout}" method="post" class="d-inline">
                                    <button type="submit" class="dropdown-item" th:text="#{nav.logout}">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <button id="themeToggleButton" class="btn theme-toggle-btn btn-sm ms-md-2" type="button">
                            <i class="bi bi-sun-fill"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="app-main">
        <div class="app-shell">
            <div class="flash-stack">
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show auto-hide-alert"
                    role="alert">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show auto-hide-alert"
                    role="alert">
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            </div>

            <div th:replace="${content}">
                <!-- Page-specific content will be inserted here -->
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <p class="mb-0">&copy; NhaTro Management <span th:text="${#dates.year(#dates.createNow())}"></span></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script th:src="@{/js/theme-toggle.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const path = window.location.pathname;
            const navLinks = document.querySelectorAll('#mainNav .nav-link[data-nav]');
            navLinks.forEach(link => {
                const nav = link.getAttribute('data-nav');
                if (!nav) return;
                let match = false;
                if (nav === 'home') {
                    match = path === '/' || path === '';
                } else if (nav === 'bills') {
                    match = path.startsWith('/bills') && !path.includes('/statistics');
                } else {
                    match = path.startsWith('/' + nav);
                }
                if (match) link.classList.add('active');
            });
            const autoHideAlerts = document.querySelectorAll('.auto-hide-alert');
            autoHideAlerts.forEach(function (alert) {
                setTimeout(function () {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }, 3000); // Hide after 3 seconds (3000 milliseconds)
            });
        });
    </script>
</body>

</html>
